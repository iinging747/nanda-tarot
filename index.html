<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1232">
<title>난다의 한 장 행운 | 난다사주</title>
<link rel="preload" as="image" href="cards/intro-bg.png">
<link rel="preload" as="image" href="cards/pick-bg.png">
<link rel="preload" as="image" href="cards/result-bg.png">
<link rel="preload" as="image" href="cards/butterfly.png">
<style>
  :root{
    --gold:#e8c574;
    --ivory:#f4ead0;
    --paper-l:#f1e3bd;
    --paper-m:#ddc995;
    --paper-d:#c9b27a;
    --paper-border:#b9924c;
    --ink:#3a2810;
    --ink-deep:#2a1c08;
    --ink-mid:#7a4a14;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#000;color:#e9eaff;font-family:'Noto Serif KR','Nanum Myeongjo',serif;font-weight:400;letter-spacing:.02em;user-select:none}
  body{display:flex;align-items:center;justify-content:center}

  .stage{
    position:relative;width:100%;height:100%;max-width:540px;max-height:960px;
    aspect-ratio:9/16;overflow:hidden;background:#050818;
  }
  @media (min-aspect-ratio: 9/16){
    .stage{width:auto;height:100%}
  }

  /* === Screens === */
  .screen{
    position:absolute;inset:0;display:none;
    background-size:cover;background-position:center;background-repeat:no-repeat;
  }
  .screen.active{display:block;animation:fadeIn .6s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .screen#screen-intro{background-image:url('cards/intro-bg.png')}
  .screen#screen-pick{background-image:url('cards/pick-bg.png')}
  .screen#screen-result{background-image:url('cards/result-bg.png')}

  /* === Hit zones (invisible click zones over drawn buttons) === */
  .hit{position:absolute;background:transparent;border:0;cursor:pointer;outline:none;padding:0;font:0/0 a;color:transparent}
  .hit:focus{outline:none}
  /* Optional debug border:
  .hit{background:rgba(255,255,0,.2);border:1px dashed yellow}
  */

  /* Top-left back, top-right home (positioned over drawn nav icons) */
  .hit-back{top:2%;left:3%;width:11%;height:5%;z-index:30}
  .hit-home{top:2%;right:3%;width:11%;height:5%;z-index:30}

  /* === Intro: '카드 선택하기' button === */
  .hit-start{top:88.5%;left:24%;width:52%;height:6%;z-index:25;border-radius:30px}

  /* === Pick: 9 card hit zones + center + reveal === */
  /* Measured from pick-bg.png (941×1672): cards at y 380–610 (22.7%–36.5%), x 20–920 (2.1%–97.9%) */
  .pick-cards{position:absolute;top:22.7%;left:2.1%;right:2.1%;height:13.8%;display:flex;gap:.45%;z-index:25}
  .pick-cards .hit-card{flex:1;cursor:pointer;border-radius:4px;position:relative;transition:transform .25s, filter .25s;background:transparent}
  .pick-cards .hit-card.picked{opacity:0;pointer-events:none}
  .pick-cards .hit-card.disabled{cursor:default;opacity:.55;filter:brightness(.55)}
  .pick-cards .hit-card:hover:not(.disabled):not(.picked){transform:translateY(-6px);filter:brightness(1.3) drop-shadow(0 0 10px rgba(232,197,116,.7))}

  /* Center "selected" card area — measured: y 730–1170 (43.7%–70%), x 330–610 (35.1%–64.8%) */
  .center-card-zone{
    position:absolute;top:43.7%;left:35.1%;width:29.7%;height:26.3%;z-index:24;
    pointer-events:none;
  }
  .center-glow{
    position:absolute;inset:-12%;border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(232,197,116,.5) 0%, rgba(180,150,255,.25) 40%, transparent 70%);
    opacity:0;transition:opacity .8s ease;
    animation:glowPulse 3s ease-in-out infinite;
    filter:blur(2px);
  }
  .has-pick .center-glow{opacity:1}
  @keyframes glowPulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.08)}
  }
  .center-sparkle{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(circle at 50% 50%, rgba(255,245,200,.35) 0%, transparent 35%);
    opacity:0;
  }
  .has-pick .center-sparkle{
    animation:sparkleFlash 1.2s ease-out;
  }
  @keyframes sparkleFlash{
    0%{opacity:0;transform:scale(.6)}
    40%{opacity:1}
    100%{opacity:0;transform:scale(1.6)}
  }

  /* Reveal button — measured: y 1400–1510 (83.7%–90.3%), x 155–786 (16.5%–83.5%) */
  .hit-reveal{
    top:83.7%;left:16.5%;width:67%;height:6.6%;z-index:25;border-radius:8px;
    opacity:.4;transition:opacity .35s;pointer-events:none;
  }
  .hit-reveal.ready{opacity:1;pointer-events:auto;animation:revealPulse 2s ease-in-out infinite}
  @keyframes revealPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(232,197,116,0)}
    50%{box-shadow:0 0 22px 4px rgba(232,197,116,.35), inset 0 0 14px rgba(232,197,116,.18)}
  }

  /* === Butterfly flying sprite === */
  .butterfly{
    position:absolute;width:32%;aspect-ratio:510/320;
    background:url('cards/butterfly.png') center/contain no-repeat;
    z-index:28;pointer-events:none;opacity:0;
    filter:drop-shadow(0 0 14px rgba(180,160,255,.55));
    left:-35%;top:70%;
    transition:opacity .4s;
  }
  .butterfly.flying{
    opacity:1;
    animation:flyIn 2.2s cubic-bezier(.32,.7,.4,1) forwards;
  }
  @keyframes flyIn{
    0%   {left:-35%;top:80%;transform:rotate(-6deg) scale(.85)}
    35%  {left:18%; top:38%;transform:rotate(6deg)  scale(1)}
    65%  {left:48%; top:58%;transform:rotate(-4deg) scale(1.02)}
    100% {left:34%; top:46%;transform:rotate(0deg)  scale(.7)}
  }
  .butterfly.flying::after{
    content:"";position:absolute;left:-4%;top:35%;width:8%;height:30%;
    background:radial-gradient(ellipse, rgba(255,240,200,.85) 0%, transparent 70%);
    animation:trail 2.2s ease-out;
  }
  @keyframes trail{
    0%{opacity:0;transform:scale(.5)}
    50%{opacity:.9}
    100%{opacity:0;transform:scale(2)}
  }

  /* === Result: content overlay inside parchment === */
  .parchment-content{
    position:absolute;top:7.5%;left:7%;right:7%;bottom:13.5%;
    background:linear-gradient(180deg,#f1e3bd 0%, #ddc995 60%, #c9b27a 100%);
    border:2px solid var(--paper-border);border-radius:6px;
    padding:28px 26px 30px;
    color:var(--ink);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    z-index:20;
    box-shadow:0 0 30px rgba(232,197,116,.25), inset 0 0 20px rgba(120,80,30,.12);
    animation:resultIn .9s ease;
  }
  .parchment-content::-webkit-scrollbar{display:none}
  .parchment-content::before{
    content:"";position:absolute;inset:5px;border:1px solid rgba(120,85,40,.4);border-radius:3px;pointer-events:none;
  }
  @keyframes resultIn{
    0%{opacity:0;transform:scale(.94)}
    100%{opacity:1;transform:none}
  }

  .r-num{text-align:center;font-family:'Cormorant Garamond','Times New Roman',serif;font-size:32px;color:var(--ink);font-weight:500;letter-spacing:.15em;line-height:1}
  .r-name{text-align:center;margin-top:4px;font-size:18px;font-weight:600;color:var(--ink-deep);letter-spacing:.04em}
  .r-name-en{text-align:center;font-family:'Cormorant Garamond',serif;font-size:11.5px;color:var(--ink-mid);letter-spacing:.22em;margin-top:2px}
  .r-divider{display:flex;align-items:center;justify-content:center;margin:12px 0 10px;color:#8a6420}
  .r-divider::before,.r-divider::after{content:"";flex:0 1 60px;height:1px;background:#8a6420;opacity:.55}
  .r-divider span{margin:0 12px;font-size:12px;letter-spacing:.3em}
  .r-keyword{text-align:center;font-size:13px;color:#5a3a10;letter-spacing:.14em;margin-bottom:8px}
  .r-headline{text-align:center;font-size:16.5px;line-height:1.55;font-weight:500;color:var(--ink-deep);letter-spacing:.02em;margin:4px 4px 14px}
  .r-headline em{font-style:normal;color:var(--ink-mid);font-weight:700}
  .r-section{margin:12px 2px 2px}
  .r-section h4{
    font-size:12px;color:var(--ink-mid);font-weight:700;letter-spacing:.28em;
    display:flex;align-items:center;gap:8px;
  }
  .r-section h4::before{content:"";flex:0 0 10px;height:1px;background:#a07a30;opacity:.5}
  .r-section h4::after{content:"";flex:1;height:1px;background:#a07a30;opacity:.5}
  .r-section p{font-size:13.5px;line-height:1.75;color:var(--ink);margin-top:5px;text-align:left}

  /* CTA — replaces drawn '결과 확인하기' at bottom of result image */
  .cta-bar{
    position:absolute;left:0;right:0;bottom:0;height:13.5%;
    z-index:25;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    padding:6px 18px 10px;
    background:linear-gradient(180deg, rgba(8,12,40,0) 0%, rgba(8,12,40,.78) 35%, rgba(5,8,24,.95) 100%);
  }
  .cta-line{font-size:11.5px;color:#cfc8e6;letter-spacing:.06em;line-height:1.4;text-align:center;opacity:.92}
  .cta-line strong{color:#fdf6dd;font-weight:500}
  .cta-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
  .btn-cta{
    display:inline-block;padding:9px 16px;
    background:linear-gradient(135deg,rgba(232,197,116,.22),rgba(110,90,200,.16));
    border:1px solid rgba(232,197,116,.55);border-radius:24px;
    color:var(--ivory);font-family:'Noto Serif KR',serif;font-size:12.5px;letter-spacing:.1em;
    cursor:pointer;backdrop-filter:blur(6px);text-decoration:none;
    box-shadow:0 0 14px rgba(232,197,116,.22), inset 0 0 8px rgba(232,197,116,.1);
    transition:transform .2s, box-shadow .2s;
    white-space:nowrap;
  }
  .btn-cta:hover{transform:translateY(-1px);box-shadow:0 0 22px rgba(232,197,116,.45)}
  .btn-redraw{
    background:rgba(15,20,55,.55);border:1px solid rgba(232,197,116,.35);
    color:#cfc8e6;font-size:11.5px;letter-spacing:.16em;
  }

  /* === Audio toggle (small, unobtrusive) === */
  .audio-toggle{
    position:absolute;bottom:1.5%;right:2.5%;z-index:50;
    width:30px;height:30px;border-radius:50%;
    background:rgba(15,20,55,.55);border:1px solid rgba(232,197,116,.4);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    backdrop-filter:blur(6px);
  }
  .audio-toggle svg{width:14px;height:14px;stroke:var(--ivory);fill:none;stroke-width:1.8}

  /* Result screen: place audio toggle a bit higher so it doesn't overlap CTA */
  #screen-result .audio-toggle{display:none}
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- ========== Screen 1: Intro ========== -->
  <div class="screen active" id="screen-intro">
    <button class="hit hit-back" data-back aria-label="back"></button>
    <button class="hit hit-home" data-home aria-label="home"></button>
    <button class="hit hit-start" id="btnStart" aria-label="카드 선택하기"></button>

    <button class="audio-toggle" id="btnAudioIntro" aria-label="bgm">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 4V6L7 10H3z"/><path d="M16 8c1.5 1.2 1.5 6.8 0 8" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- ========== Screen 2: Pick ========== -->
  <div class="screen" id="screen-pick">
    <button class="hit hit-back" data-back aria-label="back"></button>
    <button class="hit hit-home" data-home aria-label="home"></button>

    <div class="pick-cards" id="pickCards"></div>

    <div class="center-card-zone" id="centerZone">
      <div class="center-glow"></div>
      <div class="center-sparkle"></div>
    </div>

    <div class="butterfly" id="butterfly"></div>

    <button class="hit hit-reveal" id="btnReveal" aria-label="결과 확인하기"></button>

    <button class="audio-toggle" id="btnAudioPick" aria-label="bgm">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 4V6L7 10H3z"/><path d="M16 8c1.5 1.2 1.5 6.8 0 8" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- ========== Screen 3: Result ========== -->
  <div class="screen" id="screen-result">
    <button class="hit hit-back" data-back aria-label="back"></button>
    <button class="hit hit-home" data-home aria-label="home"></button>

    <div class="parchment-content">
      <div class="r-num" id="rNum">0</div>
      <div class="r-name" id="rName"></div>
      <div class="r-name-en" id="rNameEn"></div>
      <div class="r-divider"><span>✦</span></div>
      <div class="r-keyword" id="rKeyword"></div>
      <div class="r-headline" id="rHeadline"></div>

      <div class="r-section"><h4>오늘의 핵심 운</h4><p id="rCore"></p></div>
      <div class="r-section"><h4>연애운</h4><p id="rLove"></p></div>
      <div class="r-section"><h4>금전운</h4><p id="rMoney"></p></div>
      <div class="r-section"><h4>일 · 사업운</h4><p id="rWork"></p></div>
      <div class="r-section"><h4>조심할 점</h4><p id="rCaution"></p></div>
    </div>

    <div class="cta-bar">
      <div class="cta-line">더 깊은 흐름은 <strong>난다사주</strong>에서 확인하세요</div>
      <div class="cta-row">
        <a class="btn-cta" href="https://www.nandasaju.co.kr/" target="_blank" rel="noopener">내 사주로 자세히 보기 ›</a>
        <a class="btn-cta" href="https://www.nandasaju.co.kr/" target="_blank" rel="noopener">상담 바로가기</a>
        <button class="btn-cta btn-redraw" id="btnAgain">다시 뽑기</button>
      </div>
    </div>
  </div>

</div>

<script src="cards.js"></script>
<script>
/* ============ State ============ */
const drawnHistory = new Set();
let currentCard = null;
let pickInProgress = false;

const screens = {
  intro: document.getElementById('screen-intro'),
  pick: document.getElementById('screen-pick'),
  result: document.getElementById('screen-result'),
};
let history = ['intro'];

function show(id){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[id].classList.add('active');
  if(history[history.length-1] !== id) history.push(id);
}
function back(){
  if(history.length<=1){
    location.href='https://www.nandasaju.co.kr/';
    return;
  }
  history.pop();
  const prev = history[history.length-1];
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[prev].classList.add('active');
}

document.querySelectorAll('[data-home]').forEach(b=>b.addEventListener('click',()=>{
  location.href='https://www.nandasaju.co.kr/';
}));
document.querySelectorAll('[data-back]').forEach(b=>b.addEventListener('click',back));

/* ============ Build pick deck (9 invisible hit zones) ============ */
function buildDeck(){
  const wrap = document.getElementById('pickCards');
  wrap.innerHTML='';
  resetPick();
  for(let i=0;i<9;i++){
    const c = document.createElement('button');
    c.className='hit-card';
    c.setAttribute('aria-label','card-'+(i+1));
    c.addEventListener('click',()=>pickCard(c));
    wrap.appendChild(c);
  }
}

function resetPick(){
  document.getElementById('centerZone').classList.remove('has-pick');
  document.getElementById('butterfly').classList.remove('flying');
  document.getElementById('btnReveal').classList.remove('ready');
  pickInProgress = false;
  currentCard = null;
}

function pickCard(el){
  if(pickInProgress || el.classList.contains('picked')) return;
  pickInProgress = true;

  // pick a random not-yet-drawn card
  const pool = CARDS.filter(c=>!drawnHistory.has(c.id));
  const source = pool.length ? pool : CARDS;
  const card = source[Math.floor(Math.random()*source.length)];
  drawnHistory.add(card.id);
  currentCard = card;

  // visuals
  document.querySelectorAll('.hit-card').forEach(d=>{
    if(d!==el) d.classList.add('disabled');
  });
  el.classList.add('picked');

  // butterfly flies in
  const bf = document.getElementById('butterfly');
  bf.classList.remove('flying');
  void bf.offsetWidth;  // restart animation
  bf.classList.add('flying');

  // center glow + sparkle
  const center = document.getElementById('centerZone');
  center.classList.remove('has-pick');
  void center.offsetWidth;
  center.classList.add('has-pick');

  chime();

  setTimeout(()=>{
    document.getElementById('btnReveal').classList.add('ready');
    pickInProgress = false;
  }, 2300);
}

document.getElementById('btnStart').addEventListener('click',()=>{
  bgmStart();
  buildDeck();
  show('pick');
});

document.getElementById('btnReveal').addEventListener('click',()=>{
  if(!currentCard) return;
  if(!document.getElementById('btnReveal').classList.contains('ready')) return;
  renderResult(currentCard);
  show('result');
});

document.getElementById('btnAgain').addEventListener('click',()=>{
  history = ['intro'];
  buildDeck();
  show('pick');
});

/* ============ Result render ============ */
function renderResult(card){
  document.getElementById('rNum').textContent = card.num;
  document.getElementById('rName').textContent = card.name;
  document.getElementById('rNameEn').textContent = card.nameEn;
  document.getElementById('rKeyword').textContent = card.keyword;
  document.getElementById('rHeadline').innerHTML = card.headline;
  document.getElementById('rCore').textContent = card.core;
  document.getElementById('rLove').textContent = card.love;
  document.getElementById('rMoney').textContent = card.money;
  document.getElementById('rWork').textContent = card.work;
  document.getElementById('rCaution').textContent = card.caution;
  // scroll to top of parchment when re-rendered
  document.querySelector('.parchment-content').scrollTop = 0;
}

/* ============ BGM — 신비로운 앰비언트 패드 (아주 잔잔) ============ */
let audioCtx=null, bgmGain=null, bgmOn=false, bgmStarted=false;
const TARGET_BGM = 0.06;   // 마스터 볼륨 (이전 0.16에서 대폭 감소)

function bgmStart(){
  if(bgmStarted) return;
  bgmStarted=true;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();

    // master chain: gain → lowpass(어둠) → delay(공간감) → destination
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.0;

    const lp = audioCtx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=1400; lp.Q.value=.5;

    // 잔향 느낌의 피드백 딜레이
    const delay = audioCtx.createDelay(2.0);
    delay.delayTime.value = 0.62;
    const feedback = audioCtx.createGain();
    feedback.gain.value = 0.32;
    const wet = audioCtx.createGain();
    wet.gain.value = 0.45;
    const dry = audioCtx.createGain();
    dry.gain.value = 0.7;

    bgmGain.connect(lp);
    lp.connect(dry).connect(audioCtx.destination);
    lp.connect(delay);
    delay.connect(feedback).connect(delay);
    delay.connect(wet).connect(audioCtx.destination);

    // 3개 오실레이터만, 매우 낮은 게인 (A 마이너 근처)
    // A2 root, E3 fifth, A3 octave — 아주 단순한 드론
    const voices = [
      { f: 110.0,  type:'sine',     g: 0.022, lfo:0.035, lfoAmt:0.012 },
      { f: 164.81, type:'sine',     g: 0.014, lfo:0.022, lfoAmt:0.008 },
      { f: 220.0,  type:'triangle', g: 0.010, lfo:0.045, lfoAmt:0.006 },
    ];
    voices.forEach(v=>{
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = v.type; osc.frequency.value = v.f;
      g.gain.value = v.g;
      // 매우 느린 트레몰로
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = v.lfo;
      lfoG.gain.value = v.lfoAmt;
      lfo.connect(lfoG).connect(g.gain);
      osc.connect(g).connect(bgmGain);
      osc.start(); lfo.start();
    });

    // 가끔 울리는 종소리 — 더 드물고 더 작게
    function sparkle(){
      if(!audioCtx) return;
      const notes = [659.25, 784, 880, 987.77]; // E5, G5, A5, B5 (A 단조 페타토닉)
      const f = notes[Math.floor(Math.random()*notes.length)];
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type='sine';
      osc.frequency.value=f;
      const t0 = audioCtx.currentTime;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.012, t0+0.15);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+3.5);
      osc.connect(g).connect(bgmGain);
      osc.start(); osc.stop(t0+3.7);
      setTimeout(sparkle, 9000 + Math.random()*9000); // 9~18초 간격
    }
    setTimeout(sparkle, 6000);

    bgmToggle(true);
  }catch(e){}
}

function bgmToggle(on){
  if(!bgmGain) return;
  bgmOn = on;
  const now = audioCtx.currentTime;
  bgmGain.gain.cancelScheduledValues(now);
  bgmGain.gain.linearRampToValueAtTime(on?TARGET_BGM:0.0, now+1.8);
  document.querySelectorAll('.audio-toggle svg path').forEach((p,i)=>{
    if(i%2===1) p.style.display = on?'block':'none';
  });
}

document.querySelectorAll('.audio-toggle').forEach(b=>{
  b.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(!bgmStarted){ bgmStart(); return; }
    bgmToggle(!bgmOn);
  });
});

function chime(){
  if(!audioCtx) return;
  // 카드 픽 시 부드러운 종소리 — 더 작게
  const notes=[659.25, 880, 987.77]; // E5, A5, B5
  notes.forEach((f,i)=>{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';osc.frequency.value=f;
    const t=audioCtx.currentTime + i*0.09;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.025,t+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.8);
    osc.connect(g).connect(bgmGain||audioCtx.destination);
    osc.start(t);osc.stop(t+1.9);
  });
}
</script>
