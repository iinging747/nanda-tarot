<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1232">
<title>난다의 한 장 행운 | 난다사주</title>
<link rel="preload" as="image" href="cards/intro-bg.png">
<link rel="preload" as="image" href="cards/pick-bg.png">
<link rel="preload" as="image" href="cards/result-bg.png">
<link rel="preload" as="image" href="cards/result-paper.png">
<link rel="preload" as="image" href="cards/butterfly.png">
<link rel="preload" as="image" href="cards/card-back.png">
<link rel="preload" as="image" href="cards/card-front.png">
<style>
  :root{
    --gold:#e8c574;
    --ivory:#f4ead0;
    --ink:#3a2810;
    --ink-deep:#2a1c08;
    --ink-mid:#7a4a14;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#000;color:#e9eaff;font-family:'Noto Serif KR','Nanum Myeongjo',serif;font-weight:400;letter-spacing:.02em;user-select:none}
  body{display:flex;align-items:center;justify-content:center}

  .stage{
    position:relative;width:100%;height:100%;max-width:540px;max-height:960px;
    aspect-ratio:9/16;overflow:hidden;background:#050818;
  }
  @media (min-aspect-ratio: 9/16){
    .stage{width:auto;height:100%}
  }

  /* === Screens === */
  .screen{
    position:absolute;inset:0;display:none;
    background-size:cover;background-position:center;background-repeat:no-repeat;
  }
  .screen.active{display:block;animation:fadeIn .6s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .screen#screen-intro{background-image:url('cards/intro-bg.png')}
  .screen#screen-category{background-image:url('cards/category-bg.png')}
  .screen#screen-pick{background-image:url('cards/pick-bg.png')}
  .screen#screen-result{background-image:url('cards/result-bg.png')}

  /* === Hit zones (invisible click zones over drawn buttons) === */
  .hit{position:absolute;background:transparent;border:0;cursor:pointer;outline:none;padding:0;font:0/0 a;color:transparent}
  .hit:focus{outline:none}

  .hit-back{top:2%;left:3%;width:11%;height:5%;z-index:30}
  .hit-home{top:2%;right:3%;width:11%;height:5%;z-index:30}

  /* Intro: '카드 선택하기' */
  .hit-start{top:88.5%;left:24%;width:52%;height:6%;z-index:25;border-radius:30px}

  /* Category: 3 drawn buttons in category-bg.png */
  .hit-cat{position:absolute;left:18%;width:64%;height:8.5%;z-index:25;border-radius:50px;transition:transform .2s, filter .2s}
  .hit-cat:hover{transform:scale(1.02);filter:drop-shadow(0 0 14px rgba(232,197,116,.45))}
  .hit-cat[data-cat="love"]  {top:28.5%}
  .hit-cat[data-cat="money"] {top:42.5%}
  .hit-cat[data-cat="health"]{top:56.5%}

  /* === Pick: 9 card click zones over drawn cards === */
  /* Measured: y 22.7%–36.5%, x 2.1%–97.9% */
  .pick-row{
    position:absolute;top:22.7%;left:2.1%;right:2.1%;height:13.8%;
    display:flex;gap:.45%;z-index:25;
  }
  .pick-row .hit-card{
    flex:1;background:transparent;border:0;cursor:pointer;border-radius:3px;
    transition:transform .25s, filter .25s;
    position:relative;
  }
  .pick-row .hit-card:hover:not(.disabled):not(.picked){
    transform:translateY(-6px);
    filter:drop-shadow(0 0 12px rgba(232,197,116,.7));
  }
  .pick-row .hit-card.disabled{cursor:default;opacity:.45;filter:brightness(.5)}
  .pick-row .hit-card.picked{
    /* picked card briefly lights up, then becomes invisible (gone) */
    animation:cardLiftOff .9s ease forwards;
    pointer-events:none;
  }
  @keyframes cardLiftOff{
    0%{transform:translateY(0) scale(1);opacity:1;filter:drop-shadow(0 0 12px rgba(232,197,116,.9))}
    60%{transform:translateY(-18px) scale(1.08);opacity:.8;filter:drop-shadow(0 0 24px rgba(232,197,116,1))}
    100%{transform:translateY(-32px) scale(1.15);opacity:0;filter:drop-shadow(0 0 36px rgba(232,197,116,0))}
  }

  /* === Center card (overlays the drawn center card in pick-bg) === */
  /* Measured: y 43.7%–70%, x 35.1%–64.8% */
  .center-card{
    position:absolute;top:43.7%;left:35.1%;width:29.7%;
    aspect-ratio:1024/1536;
    z-index:22;
    perspective:1400px;
  }
  .center-flipper{
    width:100%;height:100%;position:relative;transform-style:preserve-3d;
    transition:transform 1.1s cubic-bezier(.5,.05,.3,1);
  }
  .center-flipper.flipped{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;
    background-size:contain;background-position:center;background-repeat:no-repeat;
    border-radius:6px;
  }
  .face.back{background-image:url('cards/card-back.png')}
  .face.front{background-image:url('cards/card-front.png');transform:rotateY(180deg)}

  /* Glow around center card after pick */
  .center-glow{
    position:absolute;inset:-22%;border-radius:50%;
    background:radial-gradient(ellipse at center,
      rgba(232,197,116,.45) 0%, rgba(180,150,255,.22) 40%, transparent 70%);
    opacity:0;transition:opacity .9s ease;
    pointer-events:none;z-index:21;
    filter:blur(2px);
  }
  .has-pick .center-glow{opacity:1;animation:glowPulse 3.5s ease-in-out infinite}
  @keyframes glowPulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.07)}
  }

  /* === Butterfly sprite (transparent PNG, flies in) === */
  .butterfly{
    position:absolute;width:30%;aspect-ratio:680/1024;
    background:url('cards/butterfly.png') center/contain no-repeat;
    z-index:28;pointer-events:none;opacity:0;
    filter:drop-shadow(0 0 14px rgba(200,170,255,.6));
    left:-25%;top:80%;
    transform-origin:center center;
  }
  .butterfly.flying{
    animation:flyIn 2.4s cubic-bezier(.32,.7,.4,1) forwards;
  }
  @keyframes flyIn{
    0%   {left:-25%;top:82%;opacity:0;  transform:rotate(-8deg) scale(.8)}
    15%  {opacity:1}
    40%  {left:22%; top:40%;opacity:1;  transform:rotate(10deg) scale(1.05)}
    70%  {left:46%; top:55%;opacity:1;  transform:rotate(-4deg) scale(1.0)}
    92%  {left:35%; top:48%;opacity:.9; transform:rotate(2deg)  scale(.7)}
    100% {left:35%; top:50%;opacity:0;  transform:rotate(0deg)  scale(.55)}
  }

  /* Reveal button — measured y 84.6%–90.3%, x 16.5%–83.5% */
  .hit-reveal{
    top:84.6%;left:16.5%;width:67%;height:5.7%;z-index:25;border-radius:8px;
    opacity:.4;transition:opacity .35s;pointer-events:none;
  }
  .hit-reveal.ready{
    opacity:1;pointer-events:auto;
    animation:revealPulse 2.4s ease-in-out infinite;
  }
  @keyframes revealPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(232,197,116,0)}
    50%{box-shadow:0 0 28px 6px rgba(232,197,116,.35), inset 0 0 16px rgba(232,197,116,.18)}
  }

  /* === Result: parchment overlay using result-paper.png === */
  /* result-paper.png is positioned to cover the drawn parchment in result-bg.png */
  .parchment-frame{
    position:absolute;top:5.5%;left:5%;right:5%;bottom:12.5%;
    background:url('cards/result-paper.png') center/100% 100% no-repeat;
    z-index:18;
    animation:resultIn 1s ease;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));
  }
  @keyframes resultIn{
    0%{opacity:0;transform:scale(.94)}
    100%{opacity:1;transform:none}
  }
  /* Content sits inside the cream interior, leaving rose vine borders visible */
  .parchment-content{
    position:absolute;top:9%;left:13%;right:13%;bottom:9%;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    color:var(--ink);
  }
  .parchment-content::-webkit-scrollbar{display:none}

  .r-num{text-align:center;font-family:'Cormorant Garamond','Times New Roman',serif;font-size:30px;color:var(--ink);font-weight:500;letter-spacing:.15em;line-height:1}
  .r-name{text-align:center;margin-top:4px;font-size:17px;font-weight:600;color:var(--ink-deep);letter-spacing:.04em}
  .r-name-en{text-align:center;font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--ink-mid);letter-spacing:.22em;margin-top:2px}
  .r-divider{display:flex;align-items:center;justify-content:center;margin:12px 0 10px;color:#8a6420}
  .r-divider::before,.r-divider::after{content:"";flex:0 1 50px;height:1px;background:#8a6420;opacity:.55}
  .r-divider span{margin:0 12px;font-size:12px;letter-spacing:.3em;color:var(--ink-mid);font-weight:600}
  .r-keyword{text-align:center;font-size:12.5px;color:#5a3a10;letter-spacing:.1em;margin-top:4px}
  .r-keyword strong{color:var(--ink-mid);font-weight:700}
  .r-headline{text-align:center;font-size:15.5px;line-height:1.55;font-weight:500;color:var(--ink-deep);letter-spacing:.02em;margin:6px 2px 14px}
  .r-headline em{font-style:normal;color:var(--ink-mid);font-weight:700}
  .r-headline strong{color:var(--ink-mid);font-weight:700}
  .r-body{font-size:14px;line-height:1.85;color:var(--ink);text-align:center;margin:2px 4px 10px;letter-spacing:.01em}
  .r-body p{margin:8px 0}

  /* === CTA bar at bottom (covers drawn '결과 확인하기' on result-bg) === */
  .cta-bar{
    position:absolute;left:0;right:0;bottom:0;height:13%;
    z-index:25;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    padding:6px 16px 10px;
    background:linear-gradient(180deg, rgba(8,12,40,0) 0%, rgba(8,12,40,.85) 35%, rgba(5,8,24,.98) 100%);
  }
  .cta-line{font-size:11px;color:#cfc8e6;letter-spacing:.06em;line-height:1.4;text-align:center;opacity:.92}
  .cta-line strong{color:#fdf6dd;font-weight:500}
  .cta-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;align-items:center}
  .btn-cta{
    display:inline-block;padding:8px 14px;
    background:linear-gradient(135deg,rgba(232,197,116,.22),rgba(110,90,200,.16));
    border:1px solid rgba(232,197,116,.55);border-radius:24px;
    color:var(--ivory);font-family:'Noto Serif KR',serif;font-size:12px;letter-spacing:.1em;
    cursor:pointer;backdrop-filter:blur(6px);text-decoration:none;
    box-shadow:0 0 14px rgba(232,197,116,.22), inset 0 0 8px rgba(232,197,116,.1);
    transition:transform .2s, box-shadow .2s;
    white-space:nowrap;
  }
  .btn-cta:hover{transform:translateY(-1px);box-shadow:0 0 22px rgba(232,197,116,.45)}
  .btn-redraw{
    background:rgba(15,20,55,.55);border:1px solid rgba(232,197,116,.35);
    color:#cfc8e6;font-size:11px;letter-spacing:.16em;
  }

  /* === Audio toggle (small, unobtrusive) === */
  .audio-toggle{
    position:absolute;bottom:1.5%;right:2.5%;z-index:50;
    width:30px;height:30px;border-radius:50%;
    background:rgba(15,20,55,.55);border:1px solid rgba(232,197,116,.4);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    backdrop-filter:blur(6px);
  }
  .audio-toggle svg{width:14px;height:14px;stroke:var(--ivory);fill:none;stroke-width:1.8}
  #screen-result .audio-toggle{display:none}
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- ========== Screen 1: Intro ========== -->
  <div class="screen active" id="screen-intro">
    <button class="hit hit-back" data-back aria-label="back"></button>
    <button class="hit hit-home" data-home aria-label="home"></button>
    <button class="hit hit-start" id="btnStart" aria-label="카드 선택하기"></button>

    <button class="audio-toggle" id="btnAudioIntro" aria-label="bgm">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 4V6L7 10H3z"/><path d="M16 8c1.5 1.2 1.5 6.8 0 8" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- ========== Screen 2: Category ========== -->
  <div class="screen" id="screen-category">
    <button class="hit hit-back" data-back aria-label="back"></button>
    <button class="hit hit-home" data-home aria-label="home"></button>
    <button class="hit hit-cat" data-cat="love"   aria-label="연애운"></button>
    <button class="hit hit-cat" data-cat="money"  aria-label="금전운"></button>
    <button class="hit hit-cat" data-cat="health" aria-label="건강운"></button>

    <button class="audio-toggle" aria-label="bgm">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 4V6L7 10H3z"/><path d="M16 8c1.5 1.2 1.5 6.8 0 8" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- ========== Screen 3: Pick ========== -->
  <div class="screen" id="screen-pick">
    <button class="hit hit-back" data-back aria-label="back"></button>
    <button class="hit hit-home" data-home aria-label="home"></button>

    <div class="pick-row" id="pickRow"></div>

    <div class="center-card" id="centerCard">
      <div class="center-glow"></div>
      <div class="center-flipper" id="centerFlipper">
        <div class="face back"></div>
        <div class="face front"></div>
      </div>
    </div>

    <div class="butterfly" id="butterfly"></div>

    <button class="hit hit-reveal" id="btnReveal" aria-label="결과 확인하기"></button>

    <button class="audio-toggle" id="btnAudioPick" aria-label="bgm">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 4V6L7 10H3z"/><path d="M16 8c1.5 1.2 1.5 6.8 0 8" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- ========== Screen 4: Result ========== -->
  <div class="screen" id="screen-result">
    <button class="hit hit-back" data-back aria-label="back"></button>
    <button class="hit hit-home" data-home aria-label="home"></button>

    <div class="parchment-frame">
      <div class="parchment-content">
        <div class="r-num" id="rNum">0</div>
        <div class="r-name" id="rName"></div>
        <div class="r-name-en" id="rNameEn"></div>
        <div class="r-divider"><span id="rCatLabel">✦</span></div>
        <div class="r-headline" id="rHeadline"></div>
        <div class="r-body" id="rBody"></div>
        <div class="r-divider"><span>✦</span></div>
        <div class="r-keyword" id="rKeyword"></div>
      </div>
    </div>

    <div class="cta-bar">
      <div class="cta-line">더 깊은 흐름은 <strong>난다사주</strong>에서 확인하세요</div>
      <div class="cta-row">
        <a class="btn-cta" href="https://www.nandasaju.co.kr/" target="_blank" rel="noopener">내 사주로 자세히 보기 ›</a>
        <a class="btn-cta" href="https://www.nandasaju.co.kr/" target="_blank" rel="noopener">상담 바로가기</a>
        <button class="btn-cta btn-redraw" id="btnAgain">다시 뽑기</button>
      </div>
    </div>
  </div>

</div>

<script src="cards.js"></script>
<script>
/* ============ State ============ */
const drawnHistory = new Set();
let currentCard = null;
let selectedCategory = 'love';  // 'love' | 'money' | 'health'
let pickInProgress = false;

const CATEGORY_LABEL = { love:'연애운', money:'금전운', health:'건강운' };

const screens = {
  intro: document.getElementById('screen-intro'),
  category: document.getElementById('screen-category'),
  pick: document.getElementById('screen-pick'),
  result: document.getElementById('screen-result'),
};
let history = ['intro'];

function show(id){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[id].classList.add('active');
  if(history[history.length-1] !== id) history.push(id);
}
function back(){
  if(history.length<=1){
    location.href='https://www.nandasaju.co.kr/';
    return;
  }
  history.pop();
  const prev = history[history.length-1];
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[prev].classList.add('active');
}

document.querySelectorAll('[data-home]').forEach(b=>b.addEventListener('click',()=>{
  location.href='https://www.nandasaju.co.kr/';
}));
document.querySelectorAll('[data-back]').forEach(b=>b.addEventListener('click',back));

/* ============ Build pick deck (9 invisible click zones) ============ */
function buildDeck(){
  const wrap = document.getElementById('pickRow');
  wrap.innerHTML='';
  resetPick();
  for(let i=0;i<9;i++){
    const c = document.createElement('button');
    c.className='hit-card';
    c.setAttribute('aria-label','card-'+(i+1));
    c.addEventListener('click',()=>pickCard(c));
    wrap.appendChild(c);
  }
}

function resetPick(){
  document.getElementById('centerCard').classList.remove('has-pick');
  document.getElementById('centerFlipper').classList.remove('flipped');
  document.getElementById('butterfly').classList.remove('flying');
  document.getElementById('btnReveal').classList.remove('ready');
  pickInProgress = false;
  currentCard = null;
}

function pickCard(el){
  if(pickInProgress || el.classList.contains('picked')) return;
  pickInProgress = true;

  // pick a random not-yet-drawn card
  const pool = CARDS.filter(c=>!drawnHistory.has(c.id));
  const source = pool.length ? pool : CARDS;
  const card = source[Math.floor(Math.random()*source.length)];
  drawnHistory.add(card.id);
  currentCard = card;

  // visuals: the picked card lifts off, others fade
  document.querySelectorAll('.hit-card').forEach(d=>{
    if(d!==el) d.classList.add('disabled');
  });
  el.classList.add('picked');

  // butterfly flies in
  const bf = document.getElementById('butterfly');
  bf.classList.remove('flying');
  void bf.offsetWidth;
  bf.classList.add('flying');

  // center glow appears
  const center = document.getElementById('centerCard');
  center.classList.remove('has-pick');
  void center.offsetWidth;
  setTimeout(()=>center.classList.add('has-pick'), 1200);

  // card flips when butterfly arrives
  setTimeout(()=>{
    document.getElementById('centerFlipper').classList.add('flipped');
    chime();
  }, 1800);

  setTimeout(()=>{
    document.getElementById('btnReveal').classList.add('ready');
    pickInProgress = false;
  }, 2900);
}

document.getElementById('btnStart').addEventListener('click',()=>{
  bgmStart();
  show('category');
});

document.querySelectorAll('.hit-cat').forEach(b=>{
  b.addEventListener('click',()=>{
    selectedCategory = b.dataset.cat;
    buildDeck();
    show('pick');
  });
});

document.getElementById('btnReveal').addEventListener('click',()=>{
  if(!currentCard) return;
  if(!document.getElementById('btnReveal').classList.contains('ready')) return;
  renderResult(currentCard);
  show('result');
});

document.getElementById('btnAgain').addEventListener('click',()=>{
  history = ['intro'];
  show('category');
});

/* ============ Result render ============ */
function getCategoryText(card, cat){
  if(cat==='love')   return card.love;
  if(cat==='money')  return card.money;
  if(cat==='health') return (typeof HEALTH!=='undefined' && HEALTH[card.id]) ? HEALTH[card.id] : card.work;
  return card.love;
}
function buildCategoryHeadline(card, cat){
  // 카드의 기존 헤드라인은 "오늘은 연애에서..." 형태로 연애 위주
  // 카테고리에 맞게 자연스럽게 변환: "오늘은 [카테고리]에서 '...날'입니다."
  const label = CATEGORY_LABEL[cat] || '운';
  const m = card.headline.match(/"<em>([^<]+)<\/em>"/);
  if(m){
    return '오늘은 <strong>'+label+'</strong>에서 "<em>'+m[1]+'</em>" 흐름입니다.';
  }
  return card.headline;
}
function renderResult(card){
  document.getElementById('rNum').textContent = card.num;
  document.getElementById('rName').textContent = card.name;
  document.getElementById('rNameEn').textContent = card.nameEn;
  document.getElementById('rCatLabel').textContent = CATEGORY_LABEL[selectedCategory] || '운';
  document.getElementById('rHeadline').innerHTML = buildCategoryHeadline(card, selectedCategory);

  // body: 선택된 카테고리의 운세 본문
  const body = document.getElementById('rBody');
  body.innerHTML='';
  const text = getCategoryText(card, selectedCategory) || '';
  text.split(/\n\n+/).forEach(par=>{
    if(!par.trim()) return;
    const p = document.createElement('p');
    p.innerHTML = par.replace(/\n/g,'<br>');
    body.appendChild(p);
  });

  document.getElementById('rKeyword').innerHTML = '키워드 — <strong>'+card.keyword+'</strong>';

  const pc = document.querySelector('.parchment-content');
  if(pc) pc.scrollTop = 0;
}

/* ============ BGM — 잔잔한 앰비언트 패드 ============ */
let audioCtx=null, bgmGain=null, bgmOn=false, bgmStarted=false;
const TARGET_BGM = 0.06;

function bgmStart(){
  if(bgmStarted) return;
  bgmStarted=true;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();

    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.0;

    const lp = audioCtx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=1400; lp.Q.value=.5;

    const delay = audioCtx.createDelay(2.0);
    delay.delayTime.value = 0.62;
    const feedback = audioCtx.createGain();
    feedback.gain.value = 0.32;
    const wet = audioCtx.createGain();
    wet.gain.value = 0.45;
    const dry = audioCtx.createGain();
    dry.gain.value = 0.7;

    bgmGain.connect(lp);
    lp.connect(dry).connect(audioCtx.destination);
    lp.connect(delay);
    delay.connect(feedback).connect(delay);
    delay.connect(wet).connect(audioCtx.destination);

    const voices = [
      { f: 110.0,  type:'sine',     g: 0.022, lfo:0.035, lfoAmt:0.012 },
      { f: 164.81, type:'sine',     g: 0.014, lfo:0.022, lfoAmt:0.008 },
      { f: 220.0,  type:'triangle', g: 0.010, lfo:0.045, lfoAmt:0.006 },
    ];
    voices.forEach(v=>{
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = v.type; osc.frequency.value = v.f;
      g.gain.value = v.g;
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = v.lfo;
      lfoG.gain.value = v.lfoAmt;
      lfo.connect(lfoG).connect(g.gain);
      osc.connect(g).connect(bgmGain);
      osc.start(); lfo.start();
    });

    function sparkle(){
      if(!audioCtx) return;
      const notes = [659.25, 784, 880, 987.77];
      const f = notes[Math.floor(Math.random()*notes.length)];
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type='sine';
      osc.frequency.value=f;
      const t0 = audioCtx.currentTime;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.012, t0+0.15);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+3.5);
      osc.connect(g).connect(bgmGain);
      osc.start(); osc.stop(t0+3.7);
      setTimeout(sparkle, 9000 + Math.random()*9000);
    }
    setTimeout(sparkle, 6000);

    bgmToggle(true);
  }catch(e){}
}

function bgmToggle(on){
  if(!bgmGain) return;
  bgmOn = on;
  const now = audioCtx.currentTime;
  bgmGain.gain.cancelScheduledValues(now);
  bgmGain.gain.linearRampToValueAtTime(on?TARGET_BGM:0.0, now+1.8);
}

document.querySelectorAll('.audio-toggle').forEach(b=>{
  b.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(!bgmStarted){ bgmStart(); return; }
    bgmToggle(!bgmOn);
  });
});

function chime(){
  if(!audioCtx) return;
  const notes=[659.25, 880, 987.77];
  notes.forEach((f,i)=>{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';osc.frequency.value=f;
    const t=audioCtx.currentTime + i*0.09;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.025,t+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.8);
    osc.connect(g).connect(bgmGain||audioCtx.destination);
    osc.start(t);osc.stop(t+1.9);
  });
}
</script>
